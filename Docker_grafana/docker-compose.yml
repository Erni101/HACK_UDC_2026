services:
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_local
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - hack_net
    depends_on:
      backend_python:
        condition: service_healthy

  backend_python:
    build: ../Backend_Py
    container_name: api_hackathon
    ports:
      - "5000:5000"
    restart: unless-stopped
    environment:
      - TOMTOM_API_KEY=${TOMTOM_API_KEY}
      - TOMTOM_BBOX=-8.45,43.30,-8.35,43.40
      - TOMTOM_LANGUAGE=es-ES
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - hack_net

networks:
  hack_net:
    driver: bridge